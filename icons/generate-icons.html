<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
</head>
<body>
  <h1>Icon Generator for Blackboard Text</h1>
  <p>Right-click each canvas and "Save image as..." to save as PNG</p>
  
  <h2>48x48 Icon</h2>
  <canvas id="icon48" width="48" height="48"></canvas>
  
  <h2>128x128 Icon</h2>
  <canvas id="icon128" width="128" height="128"></canvas>

  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const scale = size / 48;
      
      // Background
      ctx.fillStyle = '#ECEDE7';
      roundRect(ctx, 0, 0, size, size, 8 * scale);
      ctx.fill();
      
      // Text lines
      ctx.fillStyle = '#6D68B3';
      roundRect(ctx, 8 * scale, 12 * scale, 32 * scale, 3 * scale, 1.5 * scale);
      ctx.fill();
      roundRect(ctx, 8 * scale, 20 * scale, 28 * scale, 3 * scale, 1.5 * scale);
      ctx.fill();
      roundRect(ctx, 8 * scale, 28 * scale, 32 * scale, 3 * scale, 1.5 * scale);
      ctx.fill();
      roundRect(ctx, 8 * scale, 36 * scale, 20 * scale, 3 * scale, 1.5 * scale);
      ctx.fill();
    }
    
    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }
    
    drawIcon(document.getElementById('icon48'), 48);
    drawIcon(document.getElementById('icon128'), 128);
    
    // Auto-download
    setTimeout(() => {
      const canvas48 = document.getElementById('icon48');
      const canvas128 = document.getElementById('icon128');
      
      const link48 = document.createElement('a');
      link48.download = 'icon-48.png';
      link48.href = canvas48.toDataURL('image/png');
      
      const link128 = document.createElement('a');
      link128.download = 'icon-128.png';
      link128.href = canvas128.toDataURL('image/png');
      
      document.body.appendChild(document.createElement('br'));
      document.body.appendChild(document.createElement('br'));
      
      const downloadBtn48 = document.createElement('a');
      downloadBtn48.href = canvas48.toDataURL('image/png');
      downloadBtn48.download = 'icon-48.png';
      downloadBtn48.textContent = 'Download 48x48 PNG';
      downloadBtn48.style.marginRight = '20px';
      document.body.appendChild(downloadBtn48);
      
      const downloadBtn128 = document.createElement('a');
      downloadBtn128.href = canvas128.toDataURL('image/png');
      downloadBtn128.download = 'icon-128.png';
      downloadBtn128.textContent = 'Download 128x128 PNG';
      document.body.appendChild(downloadBtn128);
    }, 100);
  </script>
</body>
</html>
