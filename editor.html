<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackboard Text</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div id="board">
    <div id="editorShell">
      <div id="editor" contenteditable="true" spellcheck="false" role="textbox" aria-multiline="true" aria-label="Note editor"></div>
    </div>
    <canvas id="drawingLayer" aria-label="Drawing annotations" role="img"></canvas>
  </div>

  <div class="top-right-rail">
    <div id="drawingToolbar" class="drawing-toolbar" aria-label="Drawing tools">
      <div class="drawing-toolbar-group">
        <button id="drawToggleBtn" class="drawing-tool-button drawing-toggle-button" type="button" aria-pressed="false" title="Toggle brush mode (Alt+Shift+B)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4Z"/>
          </svg>
        </button>
      </div>

      <div class="drawing-toolbar-group drawing-size-group" role="group" aria-label="Brush size">
        <button class="drawing-tool-button drawing-size-button" type="button" data-draw-size="2.5" title="Small brush">
          <span class="drawing-size-dot drawing-size-dot-sm"></span>
        </button>
        <button class="drawing-tool-button drawing-size-button" type="button" data-draw-size="4" title="Medium brush">
          <span class="drawing-size-dot drawing-size-dot-md"></span>
        </button>
        <button class="drawing-tool-button drawing-size-button" type="button" data-draw-size="7" title="Large brush">
          <span class="drawing-size-dot drawing-size-dot-lg"></span>
        </button>
      </div>

      <div class="drawing-toolbar-group">
        <button id="drawColorBtn" class="drawing-tool-button drawing-color-button" type="button" title="Brush color">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 22a10 10 0 1 1 9.6-12.8 2.5 2.5 0 0 1-2.4 3.3H17a2 2 0 0 0 0 4h1a2.5 2.5 0 0 1 2.43 3.08A10 10 0 0 1 12 22Z"/>
            <path d="M8 11h.01"/>
            <path d="M12 7h.01"/>
            <path d="M16 11h.01"/>
          </svg>
          <span id="drawColorPreview" class="drawing-color-preview"></span>
        </button>
      </div>

      <div class="drawing-toolbar-group drawing-toolbar-group-actions">
        <button id="undoDrawingBtn" class="drawing-tool-button" type="button" title="Undo last stroke (Ctrl+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 8H5V4"/>
            <path d="M5 8a8 8 0 1 1 2.34 5.66"/>
          </svg>
        </button>

        <button id="clearDrawingsBtn" class="drawing-tool-button drawing-tool-button-danger" type="button" title="Clear page drawings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 6h18"/>
            <path d="M8 6V4h8v2"/>
            <path d="M19 6l-1 13H6L5 6"/>
            <path d="M10 11v6"/>
            <path d="M14 11v6"/>
          </svg>
        </button>
      </div>
    </div>

    <input type="color" id="drawColor" value="#6D68B3" hidden>

    <!-- Page tabs -->
    <div class="page-tabs">
      <div class="page-tabs-list" id="pageTabsList" role="tablist" aria-label="Note pages"></div>
      <button class="add-page-btn" id="addPageBtn" title="Add page (Ctrl+N)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M8 3v10M3 8h10"/>
        </svg>
      </button>
      
      <!-- Emoji picker tooltip -->
      <div class="emoji-picker" id="emojiPicker">
        <div class="emoji-picker-header">
          <button class="emoji-picker-delete" id="emojiPickerDelete" title="Delete page">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 4h12M5.33 4V2.67a1.33 1.33 0 011.34-1.34h2.66a1.33 1.33 0 011.34 1.34V4M12.67 4v9.33a1.33 1.33 0 01-1.34 1.34H4.67a1.33 1.33 0 01-1.34-1.34V4h9.34z"/>
            </svg>
          </button>
        </div>
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
    </div>
  </div>

  <!-- Hidden controls - visible on hover -->
  <div class="controls-container">
    <div class="controls-panel">
      <h3>Settings</h3>
      
      <!-- Theme Section -->
      <div class="control-section">
        <div class="section-label">Theme</div>
        <div class="theme-grid" id="themeGrid"></div>
      </div>

      <div class="control-divider"></div>

      <!-- Typography Section -->
      <div class="control-section">
        <div class="section-label">Typography</div>
        
        <div class="control-group">
          <label for="fontFamily">Font</label>
          <!-- Hidden native select for form compatibility -->
          <select id="fontFamily" style="display: none;">
            <optgroup label="System Fonts">
              <option value="Georgia, serif">Georgia</option>
              <option value="'Times New Roman', serif">Times New Roman</option>
              <option value="Arial, sans-serif">Arial</option>
              <option value="'Helvetica Neue', sans-serif">Helvetica</option>
              <option value="'Courier New', monospace">Courier New</option>
              <option value="'Segoe UI', sans-serif">Segoe UI</option>
              <option value="system-ui, sans-serif">System UI</option>
            </optgroup>
            <optgroup label="Unica 77 Cyr">
              <option value="'Unica 77 Cyr', sans-serif">Unica 77 Cyr</option>
            </optgroup>
            <optgroup label="Inter">
              <option value="'Inter', sans-serif">Inter</option>
              <option value="'Inter Tight', sans-serif">Inter Tight</option>
            </optgroup>
            <optgroup label="PP Right Grotesk (Display)">
              <option value="'PP Right Grotesk Tight', sans-serif">PP Right Grotesk Tight</option>
              <option value="'PP Right Grotesk', sans-serif">PP Right Grotesk</option>
              <option value="'PP Right Grotesk Wide', sans-serif">PP Right Grotesk Wide</option>
            </optgroup>
            <optgroup label="PP Right Grotesk (Text)">
              <option value="'PP Right Text Compact', sans-serif">PP Right Text Compact</option>
              <option value="'PP Right Text', sans-serif">PP Right Text</option>
              <option value="'PP Right Text Wide', sans-serif">PP Right Text Wide</option>
            </optgroup>
          </select>
          <!-- Custom font dropdown with preview -->
          <div class="font-dropdown-wrapper" id="fontDropdownWrapper">
            <button type="button" class="font-dropdown-trigger" id="fontDropdownTrigger">
              <span class="font-dropdown-preview" id="fontDropdownPreview">Georgia</span>
              <svg class="font-dropdown-arrow" viewBox="0 0 10 10" fill="currentColor">
                <path d="M2 3.5L5 6.5L8 3.5"/>
              </svg>
            </button>
            <div class="font-dropdown-menu" id="fontDropdownMenu"></div>
          </div>
        </div>

        <div class="control-group">
          <label for="fontSize">Size <span id="fontSizeValue">18px</span></label>
          <input type="range" id="fontSize" min="12" max="128" value="18">
        </div>

        <div class="control-group">
          <label for="lineHeight">Line Height <span id="lineHeightValue">1.8</span></label>
          <input type="range" id="lineHeight" min="1" max="3" step="0.1" value="1.8">
        </div>

        <div class="control-group">
          <label for="letterSpacing">Letter Spacing <span id="letterSpacingValue">0em</span></label>
          <input type="range" id="letterSpacing" min="-0.05" max="0.2" step="0.01" value="0">
        </div>
      </div>

      <div class="control-divider"></div>

      <!-- Layout Section -->
      <div class="control-section">
        <div class="section-label">Layout</div>
        
        <div class="control-group">
          <label for="maxWidth">Content Width <span id="maxWidthValue">800px</span></label>
          <input type="range" id="maxWidth" min="400" max="2400" step="50" value="800">
        </div>
      </div>

      <div class="control-divider"></div>

      <!-- Custom Colors Section -->
      <div class="control-section">
        <div class="section-label">Custom Colors</div>
        
        <div class="color-controls">
          <div class="color-control" data-color-type="textColor">
            <label>Text</label>
            <div class="color-input-wrapper">
              <input type="color" id="textColor" value="#6D68B3">
              <input type="text" class="color-hex-input" id="textColorHex" value="#6D68B3" maxlength="7" placeholder="#000000">
            </div>
          </div>
          
          <div class="color-control" data-color-type="backgroundColor">
            <label>Background</label>
            <div class="color-input-wrapper">
              <input type="color" id="backgroundColor" value="#ECEDE7">
              <input type="text" class="color-hex-input" id="backgroundColorHex" value="#ECEDE7" maxlength="7" placeholder="#FFFFFF">
            </div>
          </div>
          
          <div class="color-control" data-color-type="selectionColor">
            <label>Selection</label>
            <div class="color-input-wrapper">
              <input type="color" id="selectionColor" value="#6D68B3">
              <input type="text" class="color-hex-input" id="selectionColorHex" value="#6D68B3" maxlength="7" placeholder="#0000FF">
            </div>
          </div>
        </div>
      </div>

      <button id="resetSettings" class="reset-btn">Reset to Defaults</button>
    </div>

    <button class="controls-icon" title="Settings" aria-label="Open settings" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Color Picker Popup - Redesigned -->
  <div class="color-picker-popup" id="colorPickerPopup">
    <div class="color-picker-header">
      <span class="color-picker-title" id="colorPickerTitle">Text Color</span>
      <button class="color-picker-close" id="colorPickerClose" type="button">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M1 1l8 8M9 1l-8 8"/>
        </svg>
      </button>
    </div>
    
    <!-- 2D Saturation-Brightness Area -->
    <div class="color-picker-area" id="colorPickerArea">
      <div class="color-picker-cursor" id="colorPickerCursor"></div>
    </div>
    
    <!-- Hue Slider -->
    <div class="color-picker-hue-wrap">
      <input type="range" class="color-picker-hue" id="colorPickerHue" min="0" max="360" value="0">
    </div>
    
    <!-- Color Preview & Hex -->
    <div class="color-picker-footer">
      <div class="color-picker-previews">
        <div class="color-picker-preview-current" id="colorPickerPreviewCurrent" title="Current"></div>
        <div class="color-picker-preview-new" id="colorPickerPreviewNew" title="New"></div>
      </div>
      <input type="text" class="color-picker-hex" id="colorPickerHexInput" maxlength="7" placeholder="#000000" spellcheck="false">
    </div>
    
    <!-- Preset Swatches -->
    <div class="color-picker-swatches" id="colorPickerSwatches"></div>
  </div>

  <!-- Save indicator -->
  <div id="saveIndicator" class="save-indicator">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 8.5l3.5 3.5 6.5-7"/>
    </svg>
  </div>

  <!-- Word/character count -->
  <div id="wordCount" class="word-count"></div>

  <script src="editor.js"></script>
</body>
</html>
