<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackboard Text</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div id="board">
    <div id="editorShell">
      <div id="editor" contenteditable="true" spellcheck="false" role="textbox" aria-multiline="true" aria-label="Note editor"></div>
    </div>
    <canvas id="drawingLayer" aria-label="Drawing annotations" role="img"></canvas>
  </div>

  <div class="top-right-rail">
    <div id="drawingToolbar" class="drawing-toolbar" role="toolbar" aria-label="Drawing tools">
      <div class="drawing-toolbar-group drawing-toolbar-group-tools" role="group" aria-label="Brush and eraser">
        <button id="drawToggleBtn" class="drawing-tool-button drawing-toggle-button" type="button" aria-pressed="false" title="Brush tool (Alt+Shift+B)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4Z"/>
          </svg>
        </button>

        <button id="eraseToggleBtn" class="drawing-tool-button drawing-toggle-button" type="button" aria-pressed="false" title="Eraser tool (Alt+Shift+E)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M13.75 5.75 18.25 10.25"/>
            <path d="m4.9 14.6 6.85-6.85a2.25 2.25 0 0 1 3.18 0l4.32 4.32a2.25 2.25 0 0 1 0 3.18l-2.5 2.5a2.25 2.25 0 0 1-1.59.66H8.99a2.25 2.25 0 0 1-1.59-.66L4.9 15.24a.45.45 0 0 1 0-.64Z"/>
            <path d="M10.25 18.41h9.25"/>
          </svg>
        </button>
      </div>

      <div class="drawing-toolbar-group" role="group" aria-label="Brush size">
        <button id="drawSizeToggleBtn" class="drawing-tool-button drawing-size-toggle" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="drawSizePopover" title="Brush size">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 7.5h12"/>
            <path d="M8.5 12h7"/>
            <path d="M10.5 16.5h3"/>
          </svg>
          <span id="drawSizeToggleStroke" class="drawing-size-toggle-stroke" aria-hidden="true"></span>
        </button>
      </div>

      <div class="drawing-toolbar-group">
        <button id="drawColorBtn" class="drawing-tool-button drawing-color-button" type="button" title="Brush color">
          <span id="drawColorPreview" class="drawing-color-preview"></span>
        </button>
      </div>

      <div class="drawing-toolbar-group drawing-toolbar-group-actions">
        <button id="undoDrawingBtn" class="drawing-tool-button" type="button" title="Undo last stroke (Ctrl/Cmd+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 7H4.75V2.75"/>
            <path d="M4.75 7c1.9-2.43 4.64-3.64 8.2-3.2 3.93.48 6.8 3.56 6.8 7.28 0 4.07-3.3 7.37-7.37 7.37H8.75"/>
          </svg>
        </button>

        <button id="clearDrawingsBtn" class="drawing-tool-button drawing-tool-button-danger" type="button" title="Clear page drawings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 4.75h6"/>
            <path d="M10.25 4.75V3.7c0-.52.43-.95.95-.95h1.6c.52 0 .95.43.95.95v1.05"/>
            <path d="M5.25 6.75h13.5"/>
            <path d="m6.75 6.75.86 10.13c.08.82.76 1.45 1.58 1.45h5.62c.82 0 1.5-.63 1.58-1.45l.86-10.13"/>
            <path d="M10.25 10.25v4.75"/>
            <path d="M13.75 10.25v4.75"/>
          </svg>
        </button>
      </div>
    </div>

    <input type="color" id="drawColor" value="#6D68B3" hidden>

    <div class="drawing-size-popover" id="drawSizePopover" role="dialog" aria-modal="false" aria-labelledby="drawSizePopoverTitle" hidden>
      <div class="drawing-size-popover-header">
        <div class="drawing-size-popover-copy">
          <p id="drawSizePopoverTitle" class="drawing-size-popover-title">Brush size</p>
          <p class="drawing-size-popover-hint">Fine-tune stroke width with minimalist slider ticks.</p>
        </div>
        <span id="drawSizeValue" class="drawing-size-value">4px</span>
      </div>

      <label class="drawing-size-control" for="drawSize">
        <input type="range" id="drawSize" class="drawing-size-slider" min="0.08" max="1.4" step="0.01" value="0.22" aria-label="Brush size">
      </label>

      <div class="drawing-size-markers" id="drawSizeMarkers" role="list" aria-label="Brush size markers"></div>
    </div>

    <!-- Page tabs -->
    <div class="page-tabs">
      <div class="page-tabs-list" id="pageTabsList" role="tablist" aria-label="Note pages"></div>
      <button class="add-page-btn" id="addPageBtn" title="Add page (Ctrl+N)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M8 3v10M3 8h10"/>
        </svg>
      </button>
      
      <!-- Emoji picker tooltip -->
      <div class="emoji-picker" id="emojiPicker" role="dialog" aria-modal="false" aria-labelledby="emojiPickerTitle" aria-describedby="emojiPickerHint">
        <div class="emoji-picker-header">
          <div class="emoji-picker-copy">
            <p class="emoji-picker-title" id="emojiPickerTitle">Page emoji</p>
            <p class="emoji-picker-hint" id="emojiPickerHint">Choose a new emoji, reset it, or delete the page.</p>
          </div>

          <div class="emoji-picker-actions">
            <button class="emoji-picker-action" id="emojiPickerClear" type="button">Reset emoji</button>
            <button class="emoji-picker-action emoji-picker-action-danger" id="emojiPickerDelete" type="button" aria-controls="deletePageConfirm" aria-expanded="false">Delete page…</button>
          </div>
        </div>

        <div class="emoji-grid" id="emojiGrid"></div>
      </div>

      <div id="deletePageConfirm" class="delete-confirm-popover" role="dialog" aria-modal="false" aria-labelledby="deletePageConfirmTitle" hidden>
        <p id="deletePageConfirmTitle" class="delete-confirm-title">Delete page?</p>
        <p class="delete-confirm-text">This removes the page text and its drawings.</p>
        <div class="delete-confirm-actions">
          <button id="cancelDeletePageBtn" class="delete-confirm-cancel" type="button">Cancel</button>
          <button id="confirmDeletePageBtn" class="delete-confirm-delete" type="button">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden controls - visible on hover -->
  <div class="controls-container">
    <div class="controls-panel">
      <div class="controls-panel-header">
        <div class="controls-panel-heading">
          <h3>Settings</h3>
        </div>
        <button id="settingsCloseBtn" class="controls-close" type="button" aria-label="Close settings">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M3 3l10 10M13 3 3 13"/>
          </svg>
        </button>
      </div>

      <!-- Theme Section -->
      <div class="control-section">
        <div class="section-label">Theme</div>
        <div class="theme-grid" id="themeGrid"></div>
      </div>

      <div class="control-divider"></div>

      <!-- Typography Section -->
      <div class="control-section">
        <div class="section-label">Type</div>
        
        <div class="control-group">
          <label for="fontFamily">Font</label>
          <!-- Hidden native select for form compatibility -->
          <select id="fontFamily" style="display: none;">
            <optgroup label="System Fonts">
              <option value="Georgia, serif">Georgia</option>
              <option value="'Times New Roman', serif">Times New Roman</option>
              <option value="Arial, sans-serif">Arial</option>
              <option value="'Helvetica Neue', sans-serif">Helvetica</option>
              <option value="'Courier New', monospace">Courier New</option>
              <option value="'Segoe UI', sans-serif">Segoe UI</option>
              <option value="system-ui, sans-serif">System UI</option>
            </optgroup>
            <optgroup label="Unica 77 Cyr">
              <option value="'Unica 77 Cyr', sans-serif">Unica 77 Cyr</option>
            </optgroup>
            <optgroup label="Inter">
              <option value="'Inter', sans-serif">Inter</option>
              <option value="'Inter Tight', sans-serif">Inter Tight</option>
            </optgroup>
            <optgroup label="PP Right Grotesk (Display)">
              <option value="'PP Right Grotesk Tight', sans-serif">PP Right Grotesk Tight</option>
              <option value="'PP Right Grotesk', sans-serif">PP Right Grotesk</option>
              <option value="'PP Right Grotesk Wide', sans-serif">PP Right Grotesk Wide</option>
            </optgroup>
            <optgroup label="PP Right Grotesk (Text)">
              <option value="'PP Right Text Compact', sans-serif">PP Right Text Compact</option>
              <option value="'PP Right Text', sans-serif">PP Right Text</option>
              <option value="'PP Right Text Wide', sans-serif">PP Right Text Wide</option>
            </optgroup>
          </select>
          <!-- Custom font dropdown with preview -->
          <div class="font-dropdown-wrapper" id="fontDropdownWrapper">
            <button type="button" class="font-dropdown-trigger" id="fontDropdownTrigger">
              <span class="font-dropdown-preview" id="fontDropdownPreview">Georgia</span>
              <svg class="font-dropdown-arrow" viewBox="0 0 10 10" fill="currentColor">
                <path d="M2 3.5L5 6.5L8 3.5"/>
              </svg>
            </button>
            <div class="font-dropdown-menu" id="fontDropdownMenu"></div>
          </div>
        </div>

        <div class="control-group">
          <label for="fontSize">Size <span id="fontSizeValue">18px</span></label>
          <input type="range" id="fontSize" min="12" max="128" value="18">
        </div>

        <div class="control-group">
          <label for="lineHeight">Line Height <span id="lineHeightValue">1.8</span></label>
          <input type="range" id="lineHeight" min="1" max="3" step="0.1" value="1.8">
        </div>

        <div class="control-group">
          <label for="letterSpacing">Letter Spacing <span id="letterSpacingValue">0em</span></label>
          <input type="range" id="letterSpacing" min="-0.05" max="0.2" step="0.01" value="0">
        </div>
      </div>

      <div class="control-divider"></div>

      <!-- Layout Section -->
      <div class="control-section">
        <div class="section-label">Canvas</div>
        
        <div class="control-group">
          <label for="maxWidth">Content Width <span id="maxWidthValue">800px</span></label>
          <input type="range" id="maxWidth" min="400" max="2400" step="50" value="800">
        </div>
      </div>

      <div class="control-divider"></div>

      <!-- Custom Colors Section -->
      <div class="control-section control-section-advanced">
        <details class="control-disclosure">
          <summary class="control-disclosure-summary">Advanced</summary>

          <div class="color-controls">
            <div class="color-control" data-color-type="textColor">
              <label>Text</label>
              <div class="color-input-wrapper">
                <input type="color" id="textColor" value="#6D68B3">
                <input type="text" class="color-hex-input" id="textColorHex" value="#6D68B3" maxlength="7" placeholder="#000000">
              </div>
            </div>
            
            <div class="color-control" data-color-type="backgroundColor">
              <label>Background</label>
              <div class="color-input-wrapper">
                <input type="color" id="backgroundColor" value="#ECEDE7">
                <input type="text" class="color-hex-input" id="backgroundColorHex" value="#ECEDE7" maxlength="7" placeholder="#FFFFFF">
              </div>
            </div>
            
            <div class="color-control" data-color-type="selectionColor">
              <label>Selection</label>
              <div class="color-input-wrapper">
                <input type="color" id="selectionColor" value="#6D68B3">
                <input type="text" class="color-hex-input" id="selectionColorHex" value="#6D68B3" maxlength="7" placeholder="#0000FF">
              </div>
            </div>
          </div>
          <p class="color-note">Highlights match the text color automatically.</p>
        </details>
      </div>

      <button id="resetSettings" class="reset-btn">Reset to Defaults</button>
    </div>

    <button id="settingsToggleBtn" class="controls-icon" title="Settings" aria-label="Open settings" aria-expanded="false" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Color Picker Popup - Redesigned -->
  <div class="color-picker-popup" id="colorPickerPopup">
    <div class="color-picker-header">
      <span class="color-picker-title" id="colorPickerTitle">Text Color</span>
      <button class="color-picker-close" id="colorPickerClose" type="button">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M1 1l8 8M9 1l-8 8"/>
        </svg>
      </button>
    </div>
    
    <!-- 2D Saturation-Brightness Area -->
    <div class="color-picker-area" id="colorPickerArea">
      <div class="color-picker-cursor" id="colorPickerCursor"></div>
    </div>
    
    <!-- Hue Slider -->
    <div class="color-picker-hue-wrap">
      <input type="range" class="color-picker-hue" id="colorPickerHue" min="0" max="360" value="0">
    </div>
    
    <!-- Color Preview & Hex -->
    <div class="color-picker-footer">
      <div class="color-picker-previews">
        <div class="color-picker-preview-current" id="colorPickerPreviewCurrent" title="Current"></div>
        <div class="color-picker-preview-new" id="colorPickerPreviewNew" title="New"></div>
      </div>
      <input type="text" class="color-picker-hex" id="colorPickerHexInput" maxlength="7" placeholder="#000000" spellcheck="false">
    </div>
    
    <!-- Preset Swatches -->
    <div class="color-picker-swatches" id="colorPickerSwatches"></div>
  </div>

  <!-- Save indicator -->
  <div id="saveIndicator" class="save-indicator">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 8.5l3.5 3.5 6.5-7"/>
    </svg>
  </div>

  <!-- Word/character count -->
  <div id="wordCount" class="word-count"></div>

  <script src="editor.js"></script>
</body>
</html>
